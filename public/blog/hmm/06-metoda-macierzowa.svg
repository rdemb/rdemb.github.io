    <rect x="596" y="146" width="128" height="40" rx="6" fill="#fbf3df" stroke="#A9761A" stroke-width="1.6"/><rect x="596" y="146" width="6" height="40" rx="3" fill="#A9761A"/><text x="614" y="171" fill="#7a560f">Trend</text><text x="712" y="171" text-anchor="end" font-family="monospace" font-weight="700" fill="#15171A">0.33</text>
