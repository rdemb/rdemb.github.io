    <rect x="420" y="146" width="128" height="40" rx="6" fill="#f6f7f9" stroke="#e3e6ea"/><rect x="420" y="146" width="6" height="40" rx="3" fill="#A9761A"/><text x="438" y="171" fill="#7a560f">Trend</text><text x="536" y="171" text-anchor="end" font-family="monospace" fill="#15171A">0.50</text>
