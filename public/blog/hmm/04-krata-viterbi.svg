<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 440" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="t4a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0L7 3L0 6Z" fill="#A9761A"/></marker>
  </defs>

  <!-- etykiety stanow -->
  <g font-size="14" font-weight="700" text-anchor="end">
    <text x="120" y="115" fill="#1f6b46">Spokój</text>
    <text x="120" y="235" fill="#7a560f">Trend</text>
    <text x="120" y="355" fill="#93331f">Panika</text>
  </g>

  <!-- faint fan w przerwie t+1 -> t+2 (z kazdego w kazdy) -->
  <g stroke="#dfe3e8" stroke-width="1.3" fill="none">
    <line x1="300" y1="110" x2="430" y2="110"/><line x1="300" y1="110" x2="430" y2="230"/><line x1="300" y1="110" x2="430" y2="350"/>
    <line x1="300" y1="230" x2="430" y2="110"/><line x1="300" y1="230" x2="430" y2="230"/><line x1="300" y1="230" x2="430" y2="350"/>
