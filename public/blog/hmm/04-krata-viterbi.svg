  </g>
  <text x="365" y="40" text-anchor="middle" font-size="12.5" fill="#9aa1ab">z każdego stanu można</text>
  <text x="365" y="56" text-anchor="middle" font-size="12.5" fill="#9aa1ab">przejść w każdy</text>
  <line x1="365" y1="64" x2="365" y2="96" stroke="#cfd4da" stroke-width="1.2"/>

  <!-- wszystkie wezly (faint) -->
  <g fill="#eef0f3" stroke="#cfd4da" stroke-width="1.3">
    <circle cx="170" cy="110" r="13"/><circle cx="300" cy="110" r="13"/><circle cx="430" cy="110" r="13"/><circle cx="560" cy="110" r="13"/><circle cx="690" cy="110" r="13"/><circle cx="820" cy="110" r="13"/>
    <circle cx="170" cy="230" r="13"/><circle cx="300" cy="230" r="13"/><circle cx="430" cy="230" r="13"/><circle cx="560" cy="230" r="13"/><circle cx="690" cy="230" r="13"/><circle cx="820" cy="230" r="13"/>
    <circle cx="170" cy="350" r="13"/><circle cx="300" cy="350" r="13"/><circle cx="430" cy="350" r="13"/><circle cx="560" cy="350" r="13"/><circle cx="690" cy="350" r="13"/><circle cx="820" cy="350" r="13"/>
  </g>

  <!-- najbardziej prawdopodobna sciezka (Viterbi) -->
  <polyline points="170,110 300,110 430,230 560,230 690,350 820,350" fill="none" stroke="#A9761A" stroke-width="3.4" marker-end="url(#t4a)"/>
  <g fill="#A9761A">
    <circle cx="170" cy="110" r="11"/><circle cx="300" cy="110" r="11"/><circle cx="430" cy="230" r="11"/><circle cx="560" cy="230" r="11"/><circle cx="690" cy="350" r="11"/><circle cx="820" cy="350" r="11"/>
  </g>
  <text x="240" y="96" text-anchor="middle" font-size="12.5" font-weight="700" fill="#A9761A">najbardziej prawdopodobna ścieżka</text>

  <!-- obserwacje (swiece) na dole -->
  <g stroke-width="2">
    <line x1="170" y1="392" x2="170" y2="416" stroke="#2f8f5f"/><rect x="164" y="398" width="12" height="12" fill="#2f8f5f"/>
    <line x1="300" y1="392" x2="300" y2="416" stroke="#2f8f5f"/><rect x="294" y="400" width="12" height="10" fill="#2f8f5f"/>
    <line x1="430" y1="388" x2="430" y2="416" stroke="#2f8f5f"/><rect x="424" y="394" width="12" height="18" fill="#2f8f5f"/>
    <line x1="560" y1="390" x2="560" y2="416" stroke="#2f8f5f"/><rect x="554" y="396" width="12" height="16" fill="#2f8f5f"/>
    <line x1="690" y1="386" x2="690" y2="420" stroke="#c2503a"/><rect x="684" y="392" width="12" height="26" fill="#c2503a"/>
    <line x1="820" y1="390" x2="820" y2="418" stroke="#c2503a"/><rect x="814" y="396" width="12" height="18" fill="#c2503a"/>
