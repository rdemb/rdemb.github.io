<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 380" font-family="'Inter','Segoe UI',system-ui,sans-serif">
  <!-- os -->
  <line x1="90" y1="300" x2="860" y2="300" stroke="#9aa1ab" stroke-width="1.4"/>
  <g font-size="12" fill="#9aa1ab" text-anchor="middle" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace">
    <line x1="110" y1="296" x2="110" y2="304" stroke="#9aa1ab"/><text x="110" y="320">−3%</text>
    <line x1="230" y1="296" x2="230" y2="304" stroke="#9aa1ab"/><text x="230" y="320">−2%</text>
    <line x1="350" y1="296" x2="350" y2="304" stroke="#9aa1ab"/><text x="350" y="320">−1%</text>
    <line x1="470" y1="294" x2="470" y2="306" stroke="#7c8693"/><text x="470" y="320">0</text>
    <line x1="590" y1="296" x2="590" y2="304" stroke="#9aa1ab"/><text x="590" y="320">+1%</text>
    <line x1="710" y1="296" x2="710" y2="304" stroke="#9aa1ab"/><text x="710" y="320">+2%</text>
    <line x1="830" y1="296" x2="830" y2="304" stroke="#9aa1ab"/><text x="830" y="320">+3%</text>
  </g>
  <text x="470" y="350" text-anchor="middle" font-size="13" fill="#6b7280">zmiana ceny w jednym kroku (dzienna)</text>

  <!-- Panika: szeroka, niska, grube ogony (czerwona) -->
  <path d="M210 300 C 350 300, 380 232, 470 232 C 560 232, 590 300, 730 300 Z" fill="#c2503a" fill-opacity="0.12" stroke="#c2503a" stroke-width="2"/>
  <!-- Trend: srednia, przesunieta w plus (zlota) -->
  <path d="M455 300 C 510 300, 520 176, 560 176 C 600 176, 610 300, 665 300 Z" fill="#A9761A" fill-opacity="0.13" stroke="#A9761A" stroke-width="2"/>
  <!-- Spokoj: waska, wysoka, wokol zera (zielona) -->
  <path d="M412 300 C 448 300, 452 120, 470 120 C 488 120, 492 300, 528 300 Z" fill="#2f8f5f" fill-opacity="0.14" stroke="#2f8f5f" stroke-width="2"/>

  <!-- jeden zaobserwowany ruch -->
  <line x1="560" y1="92" x2="560" y2="300" stroke="#3f4651" stroke-width="1.3" stroke-dasharray="4 4"/>
  <circle cx="560" cy="176" r="3.5" fill="#A9761A"/>
  <circle cx="560" cy="262" r="3.5" fill="#c2503a"/>
  <circle cx="560" cy="232.5" r="3.5" fill="#2f8f5f" opacity="0.5"/>
  <text x="560" y="84" text-anchor="middle" font-size="12" fill="#3f4651">+0.75% dziś</text>

  <!-- legenda -->
  <g font-size="13.5" fill="#3f4651">
    <rect x="96" y="56" width="14" height="14" rx="3" fill="#2f8f5f"/><text x="118" y="68">Spokój — wąsko wokół zera</text>
    <rect x="96" y="80" width="14" height="14" rx="3" fill="#A9761A"/><text x="118" y="92">Trend — przesunięte, kierunek</text>
    <rect x="96" y="104" width="14" height="14" rx="3" fill="#c2503a"/><text x="118" y="116">Panika — szeroko, grube ogony</text>
  </g>
</svg>
