<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0C766"/>
      <stop offset="1" stop-color="#E8B23A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E8B23A" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#E8B23A" stop-opacity="0"/>
    </radialGradient>
    <style>
      text{font-family:'DejaVu Sans','Liberation Sans',system-ui,Arial,sans-serif;}
      .mono{font-family:'DejaVu Sans Mono','Liberation Mono',ui-monospace,monospace;}
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="#0C0E12"/>
  <circle cx="320" cy="120" r="520" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#23272E" stroke-width="2"/>

  <!-- eyebrow -->
  <text x="60" y="92" class="mono" font-size="19" letter-spacing="4" fill="#E8B23A">D-LOGIC FORGE</text>

  <!-- left accent + headline -->
  <rect x="60" y="150" width="5" height="266" rx="2.5" fill="url(#gold)"/>
  <text x="86" y="232" font-size="56" font-weight="800" fill="#E7E9EC">Ich baute eine KI-Firma.</text>
  <text x="86" y="304" font-size="56" font-weight="800" fill="#E7E9EC">Ein Mensch.</text>
  <text x="86" y="376" font-size="56" font-weight="800" fill="#E8B23A">Vierzehn KI-Agenten.</text>
  <text x="86" y="430" font-size="22" fill="#9AA1AB">Jeder denkt wie ein Weltklasse-Experte. Die Entscheidungen treffe ich.</text>

  <!-- engine chip -->
  <rect x="86" y="500" width="430" height="46" rx="23" fill="#E8B23A" fill-opacity="0.10" stroke="#E8B23A" stroke-opacity="0.32"/>
  <text x="301" y="529" text-anchor="middle" class="mono" font-size="17" fill="#F0C766">&#9670; Claude Opus 4.8 &#183; Max-Plan</text>

  <text x="1140" y="540" text-anchor="end" class="mono" font-size="15" fill="#9AA1AB">rdemb.github.io</text>

  <!-- mini structure motif (top-right) -->
  <g>
    <rect x="945" y="150" width="140" height="44" rx="10" fill="url(#gold)"/>
    <text x="1015" y="178" text-anchor="middle" font-size="16" font-weight="700" fill="#0C0E12">CEO</text>
    <g stroke="#E8B23A" stroke-opacity="0.40" stroke-width="1.5" fill="none">
      <line x1="1015" y1="194" x2="1015" y2="218"/>
      <line x1="905" y1="218" x2="1125" y2="218"/>
      <line x1="905" y1="218" x2="905" y2="234"/>
      <line x1="960" y1="218" x2="960" y2="234"/>
      <line x1="1015" y1="218" x2="1015" y2="234"/>
      <line x1="1070" y1="218" x2="1070" y2="234"/>
      <line x1="1125" y1="218" x2="1125" y2="234"/>
    </g>
    <g fill="#E8B23A" fill-opacity="0.9">
      <circle cx="905" cy="244" r="5"/><circle cx="905" cy="266" r="5"/><circle cx="905" cy="288" r="5"/>
      <circle cx="960" cy="244" r="5"/><circle cx="960" cy="266" r="5"/><circle cx="960" cy="288" r="5"/>
      <circle cx="1015" cy="244" r="5"/><circle cx="1015" cy="266" r="5"/><circle cx="1015" cy="288" r="5"/>
      <circle cx="1070" cy="244" r="5"/><circle cx="1070" cy="266" r="5"/><circle cx="1070" cy="288" r="5"/><circle cx="1070" cy="310" r="5"/>
      <circle cx="1125" cy="244" r="5"/>
    </g>
  </g>
</svg>
