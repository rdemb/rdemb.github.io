<!doctype html>
<html lang="{{ page.lang | default: 'pl' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}rdemb — {{ page.title }}{% else %}rdemb{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  </head>
  <body>
    <div class="container">
      {% include header.html %}
      <main>
        {{ content }}
      </main>
      {% include footer.html %}
    </div>
    {% include command_palette.html %}
    <script src="{{ '/assets/js/command-palette.js' | relative_url }}?v={{ site.time | date: '%s' }}" defer></script>
  </body>
</html>
