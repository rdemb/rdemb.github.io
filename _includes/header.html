<header class="site-header">
  <div class="site-title">
    <a href="{% if page.lang == 'en' %}{{ '/en/' | relative_url }}{% elsif page.lang == 'de' %}{{ '/de/' | relative_url }}{% else %}{{ '/' | relative_url }}{% endif %}">rdemb</a>
  </div>
  <nav class="site-nav" aria-label="Primary navigation">
    {% assign lang = page.lang | default: "pl" %}
    {% assign nav_items = site.data.navigation[lang] %}
    {% for item in nav_items %}
      {% unless forloop.first %}
        <span class="nav-separator" aria-hidden="true">·</span>
        <a href="{{ item.url | relative_url }}">{{ item.title | downcase }}</a>
      {% endunless %}
    {% endfor %}
    <span class="nav-separator nav-command-separator" aria-hidden="true">·</span>
    <button class="command-trigger" type="button" aria-label="Open command palette" data-command-open>⌘K</button>
  </nav>
</header>
