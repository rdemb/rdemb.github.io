<header class="site-header">
  <div class="site-title">
    <a href="{% if page.lang == 'en' %}{{ '/en/' | relative_url }}{% else %}{{ '/' | relative_url }}{% endif %}">{{ site.title }}</a>
  </div>
  <nav class="site-nav" aria-label="Primary navigation">
    {% assign lang = page.lang | default: "pl" %}
    {% assign nav_items = site.data.navigation[lang] %}
    {% for item in nav_items %}
      <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
    {% endfor %}
    {% if lang == "en" %}
      <a class="lang-link" href="{{ page.pl_url | default: '/' | relative_url }}">PL</a>
    {% else %}
      <a class="lang-link" href="{{ page.en_url | default: '/en/' | relative_url }}">EN</a>
    {% endif %}
  </nav>
</header>
