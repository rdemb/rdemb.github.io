<header class="site-header">
  <div class="site-title">
    <a href="{% if page.lang == 'en' %}{{ '/en/' | relative_url }}{% elsif page.lang == 'de' %}{{ '/de/' | relative_url }}{% else %}{{ '/' | relative_url }}{% endif %}">rdemb</a>
  </div>
  <nav class="site-nav" aria-label="Primary navigation">
    {% assign lang = page.lang | default: "pl" %}
    {% assign nav_items = site.data.navigation[lang] %}
    {% for item in nav_items %}
      <a href="{{ item.url | relative_url }}">{{ item.title | downcase }}</a>
      {% unless forloop.last %}<span class="nav-separator" aria-hidden="true">·</span>{% endunless %}
    {% endfor %}
    <span class="lang-switch" aria-label="Language selector">
      <a href="{{ page.pl_url | default: '/' | relative_url }}">pl</a>
      <a href="{{ page.en_url | default: '/en/' | relative_url }}">en</a>
      <a href="{{ page.de_url | default: '/de/' | relative_url }}">de</a>
    </span>
    <button class="command-trigger" type="button" aria-label="Open search" title="Search / Ctrl+K" data-command-open>
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <circle cx="11" cy="11" r="6"></circle>
        <path d="m16 16 4 4"></path>
      </svg>
    </button>
  </nav>
</header>
